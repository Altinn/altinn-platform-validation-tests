namespace: authentication
base_dir: K6/api/tests/authentication/pdp-authorize/
test_definitions:
  - test_file: enduser.js
    env_file: common.env
    contexts:
      - environment: yt01
        test_run:
          env:
            - name: BREAKPOINT_STAGE_DURATION
