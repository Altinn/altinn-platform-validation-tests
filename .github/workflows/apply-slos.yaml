name: "Apply SLOs"
on:
  push:
    branches:
      - master
    paths:
      - "./slos/**"
      - "hack/generate_slos.sh"
run-name: "slos"
permissions:
  contents: "read"
jobs:
  checks:
    runs-on: "ubuntu-latest"
    environment: "test"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98"

      - name: "Generate SLOs"
        run: "hack/generate_slos.sh"
        shell: "bash"

      - name: "Setup k8s client"
        uses: "./.github/actions/setup-k8s"
        with:
          azure-client-id: "${{ secrets.AZURE_CLIENT_ID }}"
          azure-subscription-id: "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          azure-tenant-id: "${{ secrets.AZURE_TENANT_ID }}"

      - name: "Apply SLOs"
        run: "kubectl apply -f .dist/ -R || true"
        shell: "bash"
